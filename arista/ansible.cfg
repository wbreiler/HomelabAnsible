[defaults]
inventory = inventory.yml
host_key_checking = True
retry_files_enabled = False
interpreter_python = auto_silent
stdout_callback = default
# arista.eos 12.1.x and ansible.netcommon 8.5.x still use Ansible APIs that
# ansible-core 2.21 marks for removal. Keep this project-local until those
# collections release compatible replacements; do not hide warnings elsewhere.
deprecation_warnings = False

[persistent_connection]
# Avoid network_cli's deprecated Paramiko fallback. OpenSSH multiplexing
# settings do not apply to the libssh-backed persistent connection.
ssh_type = libssh
