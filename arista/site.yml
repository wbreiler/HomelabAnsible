---
# ponytail: only the hostname is managed so far; grow this into full
# desired state (vlans, interfaces, SVIs) as changes are actually needed.
- name: Configure arista-nash core switch
  hosts: arista
  gather_facts: false

  tasks:
    - name: Set hostname
      arista.eos.eos_config:
        lines:
          - hostname arista-nash

    - name: Et7 (atlas-idrac) is an IPMI port — access VLAN 10
      arista.eos.eos_l2_interfaces:
        config:
          - name: Ethernet7
            mode: access
            access:
              vlan: 10
        state: replaced   # also removes the stray trunk lines on this port

    - name: Save to startup when running config changed
      arista.eos.eos_config:
        save_when: modified
