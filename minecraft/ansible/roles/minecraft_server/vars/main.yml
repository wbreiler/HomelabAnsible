---
# roles/minecraft_server/vars/main.yml
# Static role-wide defaults.
# Java version is computed dynamically via set_fact in tasks/set_java_version.yml
# because it depends on mc_version which varies per host.

# Modrinth API base URL
modrinth_api_base: "https://api.modrinth.com/v2"

# Minecraft installation directory (consistent with update.conf)
minecraft_dir: "/opt/minecraft"

# JVM flags — MeowIce G1GC set, adapted for GraalVM CE 21 (community, Java 21 compatible).
# Removed: -XX:+UseCompactObjectHeaders (Java 24+), -Djdk.graal.EnterprisePartialUnroll (enterprise only).
# CompilerConfiguration set to community.
jvm_flags_graalvm21: >-
  --add-modules=jdk.incubator.vector
  -XX:+UseG1GC
  -XX:MaxGCPauseMillis=200
  -XX:+UnlockExperimentalVMOptions
  -XX:+UnlockDiagnosticVMOptions
  -XX:+DisableExplicitGC
  -XX:+AlwaysPreTouch
  -XX:G1NewSizePercent=28
  -XX:G1MaxNewSizePercent=50
  -XX:G1HeapRegionSize=16M
  -XX:G1ReservePercent=15
  -XX:G1MixedGCCountTarget=3
  -XX:InitiatingHeapOccupancyPercent=20
  -XX:G1MixedGCLiveThresholdPercent=90
  -XX:SurvivorRatio=32
  -XX:G1HeapWastePercent=5
  -XX:+PerfDisableSharedMem
  -XX:G1SATBBufferEnqueueingThresholdPercent=30
  -XX:G1ConcMarkStepDurationMillis=5
  -XX:G1RSetUpdatingPauseTimePercent=0
  -XX:+UseNUMA
  -XX:-DontCompileHugeMethods
  -XX:MaxNodeLimit=240000
  -XX:NodeLimitFudgeFactor=8000
  -XX:ReservedCodeCacheSize=400M
  -XX:NonNMethodCodeHeapSize=12M
  -XX:ProfiledCodeHeapSize=194M
  -XX:NonProfiledCodeHeapSize=194M
  -XX:NmethodSweepActivity=1
  -XX:+UseCriticalJavaThreadPriority
  -XX:AllocatePrefetchStyle=3
  -XX:+AlwaysActAsServerClassMachine
  -XX:+UseTransparentHugePages
  -XX:LargePageSizeInBytes=2M
  -XX:+UseLargePages
  -XX:+EagerJVMCI
  -XX:+UseStringDeduplication
  -XX:+UseAES
  -XX:+UseAESIntrinsics
  -XX:+UseFMA
  -XX:+UseLoopPredicate
  -XX:+RangeCheckElimination
  -XX:+OptimizeStringConcat
  -XX:+UseCompressedOops
  -XX:+UseThreadPriorities
  -XX:+OmitStackTraceInFastThrow
  -XX:+RewriteBytecodes
  -XX:+RewriteFrequentPairs
  -XX:+UseFPUForSpilling
  -XX:+UseFastStosb
  -XX:+UseNewLongLShift
  -XX:+UseVectorCmov
  -XX:+UseXMMForArrayCopy
  -XX:+UseXmmI2D
  -XX:+UseXmmI2F
  -XX:+UseXmmLoadAndClearUpper
  -XX:+UseXmmRegToRegMoveAll
  -XX:+EliminateLocks
  -XX:+DoEscapeAnalysis
  -XX:+AlignVector
  -XX:+OptimizeFill
  -XX:+EnableVectorSupport
  -XX:+UseCharacterCompareIntrinsics
  -XX:+UseCopySignIntrinsic
  -XX:+UseVectorStubs
  -XX:+UseFastJNIAccessors
  -XX:+UseInlineCaches
  -XX:+SegmentedCodeCache
  -Djdk.nio.maxCachedBufferSize=262144
  -Djdk.graal.UsePriorityInlining=true
  -Djdk.graal.Vectorization=true
  -Djdk.graal.OptDuplication=true
  -Djdk.graal.DetectInvertedLoopsAsCounted=true
  -Djdk.graal.LoopInversion=true
  -Djdk.graal.VectorizeHashes=true
  -Djdk.graal.VectorizeSIMD=true
  -Djdk.graal.StripMineNonCountedLoops=true
  -Djdk.graal.SpeculativeGuardMovement=true
  -Djdk.graal.TuneInlinerExploration=1
  -Djdk.graal.LoopRotation=true
  -Djdk.graal.CompilerConfiguration=community

# JVM flags — GraalVM CE 25 (MC 26.x+). Same as graalvm21 minus VectorizeHashes (removed in GraalVM 25).
