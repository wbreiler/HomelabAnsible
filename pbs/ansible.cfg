[defaults]
inventory = inventory.yml
retry_files_enabled = False
stdout_callback = ansible.posix.debug
callback_result_format = yaml
# Smart gathering with fact caching for improved performance
gathering = smart
fact_caching = jsonfile
# Store facts in project directory instead of /tmp for persistence
fact_caching_connection = .ansible/facts
fact_caching_timeout = 3600
[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# accept-new: trust on first use, but detect key changes (MITM) afterwards
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o PubkeyAuthentication=no -o StrictHostKeyChecking=accept-new
pipelining = True
