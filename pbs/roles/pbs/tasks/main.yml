---
- name: Install Python expect support
  ansible.builtin.apt:
    name: python3-pexpect
    state: present

- name: Wait for PBS service to be ready
  ansible.builtin.wait_for:
    port: 8007
    delay: 10
    timeout: 300

- name: Validate local ZFS datastore configuration
  ansible.builtin.assert:
    that:
      - pbs_zfs_pool | length > 0
      - pbs_zfs_dataset | length > 0
      - pbs_zfs_dataset == pbs_zfs_pool or pbs_zfs_dataset.startswith(pbs_zfs_pool + '/')
      - pbs_datastore_path.startswith('/')
      - pbs_datastore_path != '/'
    fail_msg: >-
      Configure an absolute, non-root pbs_datastore_path and a
      pbs_zfs_dataset within pbs_zfs_pool.

- name: Verify the local ZFS pool exists
  ansible.builtin.command:
    argv:
      - zpool
      - list
      - -H
      - -o
      - name
      - "{{ pbs_zfs_pool }}"
  register: pbs_zfs_pool_check
  changed_when: false

- name: Check whether the datastore ZFS dataset exists
  ansible.builtin.command:
    argv:
      - zfs
      - list
      - -H
      - -o
      - mountpoint
      - "{{ pbs_zfs_dataset }}"
  register: pbs_zfs_dataset_check
  changed_when: false
  failed_when: false

- name: Require a pre-existing dataset when creation is disabled
  ansible.builtin.assert:
    that:
      - pbs_zfs_dataset_check.rc == 0
    fail_msg: >-
      ZFS dataset {{ pbs_zfs_dataset }} does not exist and
      pbs_zfs_create_dataset is false.
  when: not pbs_zfs_create_dataset | bool

- name: Create the local ZFS datastore dataset
  ansible.builtin.command:
    argv:
      - zfs
      - create
      - -p
      - -o
      - "mountpoint={{ pbs_datastore_path }}"
      - -o
      - atime=off
      - "{{ pbs_zfs_dataset }}"
  when:
    - pbs_zfs_create_dataset | bool
    - pbs_zfs_dataset_check.rc != 0
  register: pbs_zfs_dataset_create
  changed_when: pbs_zfs_dataset_create.rc == 0

- name: Read the datastore ZFS mount point
  ansible.builtin.command:
    argv:
      - zfs
      - get
      - -H
      - -o
      - value
      - mountpoint
      - "{{ pbs_zfs_dataset }}"
  register: pbs_zfs_mountpoint
  changed_when: false

- name: Verify the datastore path is the ZFS dataset mount point
  ansible.builtin.assert:
    that:
      - pbs_zfs_mountpoint.stdout | trim == pbs_datastore_path
    fail_msg: >-
      ZFS dataset {{ pbs_zfs_dataset }} is mounted at
      {{ pbs_zfs_mountpoint.stdout | trim }}, but pbs_datastore_path is
      {{ pbs_datastore_path }}. Set the variables to the existing mount point
      or change the dataset mountpoint explicitly before rerunning.

- name: Check if datastore already exists
  ansible.builtin.command:
    argv:
      - proxmox-backup-manager
      - datastore
      - show
      - "{{ pbs_datastore_name }}"
  register: pbs_datastore_check
  changed_when: false
  failed_when: false

- name: Create PBS datastore
  ansible.builtin.command:
    argv:
      - proxmox-backup-manager
      - datastore
      - create
      - "{{ pbs_datastore_name }}"
      - "{{ pbs_datastore_path }}"
  when: pbs_datastore_check.rc != 0
  register: pbs_datastore_result
  changed_when: pbs_datastore_result.rc == 0
  failed_when:
    - pbs_datastore_result.rc != 0
    - "'already exists' not in pbs_datastore_result.stderr"
    - "'not empty' not in pbs_datastore_result.stderr"

- name: Create namespaces
  ansible.builtin.command:
    argv:
      - proxmox-backup-client
      - namespace
      - create
      - "{{ item }}"
      - --repository
      - "{{ pbs_datastore_name }}"
  environment:
    PBS_PASSWORD: "{{ users_root_password | default(ansible_password, true) }}"
  loop: "{{ pbs_namespaces | default([]) }}"
  register: pbs_namespace_result
  changed_when: pbs_namespace_result.rc == 0
  failed_when:
    - pbs_namespace_result.rc != 0
    - "'already exists' not in pbs_namespace_result.stderr"
  no_log: true

- name: Configure remote
  ansible.builtin.expect:
    command: >-
      proxmox-backup-manager remote create
      {{ pbs_sync_remote_name | quote }}
      --host {{ pbs_sync_remote_host | quote }}
      --auth-id {{ pbs_sync_remote_userid | quote }}
      --fingerprint {{ pbs_sync_remote_fingerprint | quote }}
      --password
    responses:
      '(?i)password:': "{{ pbs_sync_remote_password }}"
  when: pbs_configure_sync_job | default(false)
  register: pbs_remote_result
  changed_when: pbs_remote_result.rc == 0
  failed_when:
    - pbs_remote_result.rc != 0
    - "'already exists' not in pbs_remote_result.stderr"
  no_log: true

- name: Create sync job
  ansible.builtin.command:
    argv: >-
      {{
        [
          'proxmox-backup-manager', 'sync-job', 'create', pbs_sync_job_id,
          '--remote', pbs_sync_remote_name,
          '--remote-store', pbs_sync_remote_store,
          '--store', pbs_sync_store,
          '--owner', pbs_sync_owner,
          '--schedule', pbs_sync_schedule,
          '--max-depth', pbs_sync_max_depth | string,
          '--remove-vanished', pbs_sync_remove_vanished | bool | ternary('true', 'false'),
          '--encrypted-only', pbs_sync_encrypted_only | bool | ternary('true', 'false'),
          '--verified-only', pbs_sync_verified_only | bool | ternary('true', 'false')
        ]
      }}
  when: pbs_configure_sync_job | default(false)
  register: pbs_sync_job_result
  changed_when: pbs_sync_job_result.rc == 0
  failed_when:
    - pbs_sync_job_result.rc != 0
    - "'already exists' not in pbs_sync_job_result.stderr"
