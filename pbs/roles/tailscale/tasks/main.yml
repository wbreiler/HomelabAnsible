---
- name: Download Tailscale GPG key
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/debian/bookworm.noarmor.gpg
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: '0644'

- name: Install deb822 repository dependency
  ansible.builtin.apt:
    name: python3-debian
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Add Tailscale repository
  ansible.builtin.deb822_repository:
    name: tailscale
    types:
      - deb
    uris:
      - https://pkgs.tailscale.com/stable/debian
    suites:
      - bookworm
    components:
      - main
    signed_by: /usr/share/keyrings/tailscale-archive-keyring.gpg
    state: present

- name: Update apt cache for Tailscale
  ansible.builtin.apt:
    update_cache: true

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present

- name: Start and enable Tailscale service
  ansible.builtin.systemd_service:
    name: tailscaled
    state: started
    enabled: true

- name: Authenticate Tailscale
  when: tailscale_auth_key is defined and tailscale_auth_key != ""
  no_log: true
  block:
    - name: Create temporary Tailscale auth key file
      ansible.builtin.tempfile:
        state: file
        suffix: tailscale-auth-key
      register: tailscale_auth_key_file

    - name: Write Tailscale auth key
      ansible.builtin.copy:
        content: "{{ tailscale_auth_key }}"
        dest: "{{ tailscale_auth_key_file.path }}"
        mode: '0600'

    - name: Authenticate Tailscale using auth key file
      ansible.builtin.command:
        argv:
          - tailscale
          - up
          - "--authkey=file:{{ tailscale_auth_key_file.path }}"
      register: tailscale_up_result
      changed_when: "'Success' in tailscale_up_result.stdout or tailscale_up_result.rc == 0"

  always:
    - name: Remove temporary Tailscale auth key file
      ansible.builtin.file:
        path: "{{ tailscale_auth_key_file.path }}"
        state: absent
      when:
        - tailscale_auth_key_file is defined
        - tailscale_auth_key_file.path is defined
