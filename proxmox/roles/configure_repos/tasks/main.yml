---
# Disable Proxmox enterprise repository (.sources format, PVE 9+)
- name: Check if pve-enterprise.sources exists
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/pve-enterprise.sources
  register: configure_repos_enterprise_sources

- name: Disable Proxmox enterprise repository (.sources format)
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/pve-enterprise.sources
    regexp: '^Enabled:'
    line: 'Enabled: false'
    insertafter: '^Components:'
    state: present
  when: configure_repos_enterprise_sources.stat.exists

# Disable Ceph enterprise repository
- name: Check if ceph.sources exists
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/ceph.sources
  register: configure_repos_ceph_sources

- name: Disable Ceph enterprise repository
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/ceph.sources
    regexp: '^Enabled:'
    line: 'Enabled: false'
    insertafter: '^Components:'
    state: present
  when: configure_repos_ceph_sources.stat.exists

# Only add no-subscription repo if it isn't already present in proxmox.sources
- name: Check if no-subscription repo is already in proxmox.sources
  ansible.builtin.shell:
    cmd: "grep -q 'pve-no-subscription' /etc/apt/sources.list.d/proxmox.sources 2>/dev/null"
    executable: /bin/bash
  register: configure_repos_nosub_in_sources
  changed_when: false
  failed_when: false

- name: Check if no-subscription .list file exists
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/pve-no-subscription.list
  register: configure_repos_nosub_list

- name: Add Proxmox no-subscription repository (only when not already present)
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: {{ ansible_distribution_release }}
      Components: pve-no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
    dest: /etc/apt/sources.list.d/pve-no-subscription.sources
    mode: '0644'
  when:
    - configure_repos_nosub_in_sources.rc != 0
    - not configure_repos_nosub_list.stat.exists

- name: Configure APT proxy
  ansible.builtin.copy:
    content: 'Acquire::http { Proxy "http://{{ apt_proxy_host | default("10.10.40.175") }}:{{ apt_proxy_port | default(3142) }}"; }'
    dest: /etc/apt/apt.conf.d/99proxy
    owner: root
    group: root
    mode: '0644'
  when: configure_apt_proxy | default(true) | bool

- name: Update apt cache after repository changes
  ansible.builtin.apt:
    update_cache: true
  register: configure_repos_apt_update
  retries: 3
  delay: 5
  until: configure_repos_apt_update is success
