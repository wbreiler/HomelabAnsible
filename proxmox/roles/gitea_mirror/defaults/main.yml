gitea_mirror_node: "atlas"
gitea_mirror_vmid: "119"
gitea_mirror_hostname: "git-mirror-nash"
gitea_mirror_storage: "local-zfs"
gitea_mirror_template: ""  # auto-detect latest debian-1[23]-standard if empty
gitea_mirror_cores: 1
gitea_mirror_memory: 2048
gitea_mirror_disk: 6
