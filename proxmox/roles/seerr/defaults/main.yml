seerr_node: "atlas"
seerr_vmid: "117"
seerr_hostname: "overseerr-nash"
seerr_storage: "helios"
seerr_template: ""  # auto-detect latest debian-1[23]-standard if empty
seerr_cores: 4
seerr_memory: 4096
seerr_disk: 8
seerr_bridge: "vmbr0"
seerr_vlan: 40
seerr_tags:
