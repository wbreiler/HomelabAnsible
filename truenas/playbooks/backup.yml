---
- name: Back up TrueNAS configuration securely
  hosts: truenas
  gather_facts: false
  vars:
    truenas_backup_remote_path: /tmp/erebus-config-backup.tar
    truenas_backup_local_path: >-
      {{ playbook_dir }}/../artifacts/erebus-config-2026-07-18.tar

  tasks:
    - name: Start buffered TrueNAS configuration export
      ansible.builtin.raw: >-
        midclt call core.download config.save
        '[{"secretseed":true,"pool_keys":false,"root_authorized_keys":true}]'
        erebus-config-2026-07-18.tar true
      changed_when: true
      register: truenas_backup_download
      no_log: true

    - name: Parse protected download URL
      ansible.builtin.set_fact:
        truenas_backup_url: >-
          {{ (truenas_backup_download.stdout | from_json)[1] }}
      no_log: true

    - name: Transfer configuration archive
      block:
        - name: Download archive to protected remote temporary file
          ansible.builtin.raw: >-
            umask 077 &&
            curl --fail --silent --show-error
            --output {{ truenas_backup_remote_path | quote }}
            {{
              (
                'http://127.0.0.1:' +
                (truenas_system_general.ui_port | string) +
                truenas_backup_url
              ) | quote
            }}
          changed_when: true
          no_log: true

        - name: Fetch configuration archive locally
          ansible.builtin.fetch:
            src: "{{ truenas_backup_remote_path }}"
            dest: "{{ truenas_backup_local_path }}"
            flat: true
            fail_on_missing: true
          no_log: true

        - name: Set restrictive local backup permissions
          ansible.builtin.file:
            path: "{{ truenas_backup_local_path }}"
            mode: "0600"
          delegate_to: localhost
      always:
        - name: Remove remote temporary configuration archive
          ansible.builtin.raw: "rm -f {{ truenas_backup_remote_path | quote }}"
          changed_when: true
