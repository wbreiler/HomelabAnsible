---
- name: "Locate service {{ desired_service.service }}"
  ansible.builtin.set_fact:
    truenas_config_current_service: >-
      {{
        truenas_config_current_services |
        selectattr('service', 'equalto', desired_service.service) |
        first
      }}
  changed_when: false

- name: "Report check-mode drift for {{ desired_service.service }}"
  ansible.builtin.debug:
    msg: >-
      Service {{ desired_service.service }} enablement differs from desired
      state
  changed_when: true
  when:
    - ansible_check_mode or truenas_config_audit_only | default(false)
    - >-
      truenas_config_current_service.enable | bool !=
      desired_service.enable | bool

- name: "Update service {{ desired_service.service }}"
  ansible.builtin.raw: >-
    midclt call service.update {{ truenas_config_current_service.id }}
    {{ {'enable': desired_service.enable} | to_json | quote }}
  changed_when: true
  when:
    - not ansible_check_mode
    - not truenas_config_audit_only | default(false)
    - >-
      truenas_config_current_service.enable | bool !=
      desired_service.enable | bool
