---
- name: Query datasets
  ansible.builtin.raw: midclt call pool.dataset.query
  changed_when: false
  register: truenas_entities_dataset_query
  tags: [storage]

- name: Parse datasets
  ansible.builtin.set_fact:
    truenas_entities_datasets: >-
      {{ truenas_entities_dataset_query.stdout | from_json }}
  changed_when: false
  tags: [storage]

- name: Reconcile datasets
  ansible.builtin.include_tasks: dataset.yml
  loop: "{{ truenas_datasets }}"
  loop_control:
    loop_var: desired_dataset
    label: "{{ desired_dataset.name }}"
  tags: [storage]

- name: Query SMB shares
  ansible.builtin.raw: midclt call sharing.smb.query
  changed_when: false
  register: truenas_entities_smb_query
  tags: [shares]

- name: Parse SMB shares
  ansible.builtin.set_fact:
    truenas_entities_smb_shares: >-
      {{ truenas_entities_smb_query.stdout | from_json }}
  changed_when: false
  tags: [shares]

- name: Reconcile SMB shares
  ansible.builtin.include_tasks: smb.yml
  loop: "{{ truenas_smb_shares }}"
  loop_control:
    loop_var: desired_smb
    label: "{{ desired_smb.name }}"
  tags: [shares]

- name: Query NFS shares
  ansible.builtin.raw: midclt call sharing.nfs.query
  changed_when: false
  register: truenas_entities_nfs_query
  tags: [shares]

- name: Parse NFS shares
  ansible.builtin.set_fact:
    truenas_entities_nfs_shares: >-
      {{ truenas_entities_nfs_query.stdout | from_json }}
  changed_when: false
  tags: [shares]

- name: Reconcile NFS shares
  ansible.builtin.include_tasks: nfs.yml
  loop: "{{ truenas_nfs_shares }}"
  loop_control:
    loop_var: desired_nfs
    label: "{{ desired_nfs.path }}"
  tags: [shares]

- name: Query network interfaces
  ansible.builtin.raw: midclt call interface.query
  changed_when: false
  register: truenas_entities_interface_query
  tags: [network]

- name: Parse network interfaces
  ansible.builtin.set_fact:
    truenas_entities_interfaces: >-
      {{ truenas_entities_interface_query.stdout | from_json }}
  changed_when: false
  tags: [network]

- name: Reconcile network interfaces
  ansible.builtin.include_tasks: interface.yml
  loop: "{{ truenas_interfaces }}"
  loop_control:
    loop_var: desired_interface
    label: "{{ desired_interface.name }}"
  tags: [network]

- name: Commit and check in staged interface changes
  when:
    - truenas_entities_interface_update is changed
    - not ansible_check_mode
    - not truenas_entities_audit_only | default(false)
  tags: [network]
  block:
    - name: Commit interfaces with automatic rollback enabled
      ansible.builtin.raw: >-
        midclt call interface.commit
        '{"rollback":true,"checkin_timeout":60}'
      changed_when: true

    - name: Confirm connectivity after interface commit
      ansible.builtin.raw: midclt call system.info
      changed_when: false

    - name: Check in the interface changes
      ansible.builtin.raw: midclt call interface.checkin
      changed_when: true

- name: Query NTP servers
  ansible.builtin.raw: midclt call system.ntpserver.query
  changed_when: false
  register: truenas_entities_ntp_query
  tags: [schedules]

- name: Parse NTP servers
  ansible.builtin.set_fact:
    truenas_entities_ntp_servers: "{{ truenas_entities_ntp_query.stdout | from_json }}"
  changed_when: false
  tags: [schedules]

- name: Reconcile NTP servers
  ansible.builtin.include_tasks: keyed_entity.yml
  vars:
    truenas_entity_desired: "{{ desired_ntp }}"
    truenas_entity_current: "{{ truenas_entities_ntp_servers }}"
    truenas_entity_match: {address: "{{ desired_ntp.address }}"}
    truenas_entity_state: present
    truenas_entity_method: system.ntpserver
    truenas_entity_label: "NTP server {{ desired_ntp.address }}"
    truenas_entity_omit: []
  loop: "{{ truenas_ntp_servers }}"
  loop_control:
    loop_var: desired_ntp
    label: "{{ desired_ntp.address }}"
  tags: [schedules]

- name: Query local groups
  ansible.builtin.raw: midclt call group.query
  changed_when: false
  register: truenas_entities_group_query
  tags: [identity]

- name: Parse local groups
  ansible.builtin.set_fact:
    truenas_entities_groups: "{{ truenas_entities_group_query.stdout | from_json }}"
  changed_when: false
  tags: [identity]

- name: Reconcile local groups
  ansible.builtin.include_tasks: group.yml
  loop: "{{ truenas_local_groups }}"
  loop_control:
    loop_var: desired_group
    label: "{{ desired_group.name }}"
  tags: [identity]

- name: Query local users
  ansible.builtin.raw: midclt call user.query
  changed_when: false
  register: truenas_entities_user_query
  tags: [identity]

- name: Parse local users
  ansible.builtin.set_fact:
    truenas_entities_users: "{{ truenas_entities_user_query.stdout | from_json }}"
  changed_when: false
  tags: [identity]

- name: Reconcile local users
  ansible.builtin.include_tasks: user.yml
  loop: "{{ truenas_local_users }}"
  loop_control:
    loop_var: desired_user
    label: "{{ desired_user.username }}"
  tags: [identity]

- name: Query applications with configuration
  ansible.builtin.raw: >-
    midclt call app.query '[]' '{"extra":{"retrieve_config":true}}'
  changed_when: false
  register: truenas_entities_app_query
  no_log: true
  tags: [apps]

- name: Parse applications
  ansible.builtin.set_fact:
    truenas_entities_apps: "{{ truenas_entities_app_query.stdout | from_json }}"
  changed_when: false
  no_log: true
  tags: [apps]

- name: Reconcile applications
  ansible.builtin.include_tasks: app.yml
  loop: "{{ truenas_apps }}"
  loop_control:
    loop_var: desired_app
    label: "{{ desired_app.name }}"
  no_log: true
  tags: [apps]

- name: Query cron jobs
  ansible.builtin.raw: midclt call cronjob.query
  changed_when: false
  register: truenas_entities_cron_query
  tags: [schedules]

- name: Parse cron jobs
  ansible.builtin.set_fact:
    truenas_entities_cronjobs: "{{ truenas_entities_cron_query.stdout | from_json }}"
  changed_when: false
  tags: [schedules]

- name: Reconcile cron jobs
  ansible.builtin.include_tasks: keyed_entity.yml
  vars:
    truenas_entity_desired: "{{ desired_cron }}"
    truenas_entity_current: "{{ truenas_entities_cronjobs }}"
    truenas_entity_match: "{{ desired_cron.match }}"
    truenas_entity_state: "{{ desired_cron.state }}"
    truenas_entity_method: cronjob
    truenas_entity_label: "cron job {{ desired_cron.match }}"
  loop: "{{ truenas_cronjobs }}"
  loop_control:
    loop_var: desired_cron
    label: "{{ desired_cron.match }}"
  tags: [schedules]

- name: Query init and shutdown scripts
  ansible.builtin.raw: midclt call initshutdownscript.query
  changed_when: false
  register: truenas_entities_init_query
  tags: [schedules]

- name: Parse init and shutdown scripts
  ansible.builtin.set_fact:
    truenas_entities_init_scripts: "{{ truenas_entities_init_query.stdout | from_json }}"
  changed_when: false
  tags: [schedules]

- name: Reconcile init and shutdown scripts
  ansible.builtin.include_tasks: keyed_entity.yml
  vars:
    truenas_entity_desired: "{{ desired_init }}"
    truenas_entity_current: "{{ truenas_entities_init_scripts }}"
    truenas_entity_match: "{{ desired_init.match }}"
    truenas_entity_state: "{{ desired_init.state }}"
    truenas_entity_method: initshutdownscript
    truenas_entity_label: "init/shutdown script {{ desired_init.match }}"
  loop: "{{ truenas_initshutdown_scripts }}"
  loop_control:
    loop_var: desired_init
    label: "{{ desired_init.match }}"
  tags: [schedules]

- name: Query periodic snapshot tasks
  ansible.builtin.raw: midclt call pool.snapshottask.query
  changed_when: false
  register: truenas_entities_snapshot_query
  tags: [schedules]

- name: Parse periodic snapshot tasks
  ansible.builtin.set_fact:
    truenas_entities_snapshot_tasks: >-
      {{ truenas_entities_snapshot_query.stdout | from_json }}
  changed_when: false
  tags: [schedules]

- name: Reconcile periodic snapshot tasks
  ansible.builtin.include_tasks: keyed_entity.yml
  vars:
    truenas_entity_desired: "{{ desired_snapshot }}"
    truenas_entity_current: "{{ truenas_entities_snapshot_tasks }}"
    truenas_entity_match: "{{ desired_snapshot.match }}"
    truenas_entity_state: "{{ desired_snapshot.state }}"
    truenas_entity_method: pool.snapshottask
    truenas_entity_label: "snapshot task {{ desired_snapshot.match }}"
  loop: "{{ truenas_snapshot_tasks }}"
  loop_control:
    loop_var: desired_snapshot
    label: "{{ desired_snapshot.match }}"
  tags: [schedules]

- name: Query pools for scrub resolution
  ansible.builtin.raw: midclt call pool.query
  changed_when: false
  register: truenas_entities_pool_query
  tags: [schedules]

- name: Query scrub tasks
  ansible.builtin.raw: midclt call pool.scrub.query
  changed_when: false
  register: truenas_entities_scrub_query
  tags: [schedules]

- name: Parse pools and scrub tasks
  ansible.builtin.set_fact:
    truenas_entities_pools: "{{ truenas_entities_pool_query.stdout | from_json }}"
    truenas_entities_scrub_tasks: "{{ truenas_entities_scrub_query.stdout | from_json }}"
  changed_when: false
  tags: [schedules]

- name: Reconcile scrub tasks
  ansible.builtin.include_tasks: keyed_entity.yml
  vars:
    truenas_scrub_pool_id: >-
      {{
        truenas_entities_pools |
        selectattr('name', 'equalto', desired_scrub.pool_name) |
        map(attribute='id') | first
      }}
    truenas_entity_desired: >-
      {{ desired_scrub | combine({'pool': truenas_scrub_pool_id}) }}
    truenas_entity_current: "{{ truenas_entities_scrub_tasks }}"
    truenas_entity_match: {pool_name: "{{ desired_scrub.pool_name }}"}
    truenas_entity_state: present
    truenas_entity_method: pool.scrub
    truenas_entity_label: "scrub task for {{ desired_scrub.pool_name }}"
    truenas_entity_omit: [pool_name]
  loop: "{{ truenas_scrub_tasks }}"
  loop_control:
    loop_var: desired_scrub
    label: "{{ desired_scrub.pool_name }}"
  tags: [schedules]
